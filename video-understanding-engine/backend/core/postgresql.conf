# PostgreSQL connection maintenance settings
# These settings help maintain connections through firewalls, load balancers, or docker networks
tcp_keepalives_idle = 60      # TCP keepalive idle time (in seconds)
tcp_keepalives_interval = 10  # Time between TCP keepalive retransmits (in seconds)
tcp_keepalives_count = 10     # Number of TCP keepalive retransmits
